<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة تقارير الدعوة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ================== منصة تقارير الدعوة - التنسيق ================== */
:root{
  --ink:#1F2A28;
  --muted:#6B7A78;
  --bg:#FAF7F1;
  --surface:#FFFFFF;
  --border:#E5DFD2;
  --primary:#0E4749;
  --primary-dark:#0A3536;
  --primary-tint:#E4EEEC;
  --gold:#C08A3E;
  --gold-tint:#F6ECDA;
  --danger:#B3452F;
  --danger-tint:#F7E7E2;
  --success:#3E8E5B;
  --radius:10px;
  --font-body:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif;
  --font-display:'Cairo','Tajawal','Segoe UI',Tahoma,Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  direction:rtl;
  font-size:15px;
  line-height:1.6;
}
h1,h2,h3{font-family:var(--font-display);color:var(--primary-dark);margin:0 0 12px;}
.page-title{font-size:24px;font-weight:800;margin-bottom:18px;border-bottom:3px solid var(--gold);display:inline-block;padding-bottom:6px;}
.muted{color:var(--muted);}
.small{font-size:12px;}
a{color:var(--primary);}

.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:var(--muted);}

/* ---------- تسجيل الدخول ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:
  radial-gradient(circle at 20% 20%, rgba(14,71,73,0.06), transparent 40%),
  radial-gradient(circle at 80% 80%, rgba(192,138,62,0.08), transparent 40%), var(--bg);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;max-width:400px;width:100%;box-shadow:0 12px 32px rgba(14,71,73,0.08);}
.login-brand{text-align:center;margin-bottom:24px;}
.brand-mark{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;background:var(--primary);color:#fff;font-family:var(--font-display);font-weight:800;font-size:18px;margin-bottom:12px;}
.login-card h1{font-size:19px;margin-bottom:4px;}
.hint{margin-top:16px;font-size:12.5px;background:var(--gold-tint);border:1px solid var(--gold);color:#6b4a17;padding:10px 12px;border-radius:8px;}

/* ---------- نماذج عامة ---------- */
form label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--primary-dark);}
form input,form select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:14px;background:#fff;color:var(--ink);}
form input:focus,form select:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary);}
.error-text{color:var(--danger);font-size:13px;margin-top:8px;min-height:16px;}
.success-text{color:var(--success);font-size:13px;margin-top:8px;min-height:16px;}

/* ---------- أزرار ---------- */
.btn{font-family:var(--font-body);font-weight:700;font-size:14px;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;transition:transform .05s ease, box-shadow .15s ease;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--gold-tint);color:#6b4a17;border:1px solid var(--gold);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-danger{background:var(--danger-tint);color:var(--danger);border:1px solid var(--danger);}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:6px;background:var(--primary-tint);color:var(--primary-dark);border:1px solid var(--border);margin-inline-end:4px;}
.btn-block{width:100%;margin-top:18px;}

/* ---------- الهيكل العام ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--primary);color:#fff;display:flex;flex-direction:column;padding:20px 14px;}
.sidebar-brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:0 4px;}
.sidebar .brand-mark{background:rgba(255,255,255,0.15);}
.org-name{font-family:var(--font-display);font-weight:800;font-size:14px;line-height:1.3;}
.sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1;}
.nav-item{text-align:right;background:transparent;border:none;color:rgba(255,255,255,0.82);padding:11px 14px;border-radius:8px;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;}
.nav-item:hover{background:rgba(255,255,255,0.08);}
.nav-item.active{background:#fff;color:var(--primary-dark);}
.sidebar-user{border-top:1px solid rgba(255,255,255,0.15);padding-top:14px;margin-top:14px;}
.user-name{font-weight:700;font-size:14px;}
.user-role{font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:10px;}
.sidebar-designer{font-size:11px;color:rgba(255,255,255,0.55);text-align:center;margin-top:14px;}
.sidebar-designer a{color:rgba(255,255,255,0.8);}
.content{flex:1;padding:32px 40px;max-width:1100px;}

/* ---------- بطاقات إحصاء ---------- */
.stat-grid{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;min-width:180px;box-shadow:0 2px 8px rgba(14,71,73,0.04);}
.stat-num{font-family:var(--font-display);font-size:30px;font-weight:800;color:var(--primary);}
.stat-label{font-size:13px;color:var(--muted);margin-top:4px;}
.note-box{background:var(--gold-tint);border:1px solid var(--gold);color:#6b4a17;padding:10px 14px;border-radius:8px;font-size:13px;max-width:600px;}

/* ---------- الجداول ---------- */
.toolbar{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin:16px 0 20px;background:var(--surface);border:1px solid var(--border);padding:14px 16px;border-radius:var(--radius);}
.toolbar label{font-size:13px;font-weight:700;color:var(--primary-dark);display:flex;flex-direction:column;gap:4px;}
.toolbar select,.toolbar input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font-body);}

table.data-table,table.report-table,table.entry-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
table.data-table th,table.report-table th,table.entry-table th{background:var(--primary);color:#fff;padding:10px 12px;font-size:13px;text-align:right;}
table.data-table td,table.report-table td,table.entry-table td{padding:9px 12px;border-top:1px solid var(--border);font-size:13.5px;vertical-align:middle;}
table.data-table tr:hover td{background:var(--primary-tint);}
.actions-cell{white-space:nowrap;}
.cat-row td{background:var(--gold-tint);color:#6b4a17;font-weight:800;font-size:12.5px;}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-on{background:#E1F3E7;color:var(--success);}
.badge-off{background:var(--danger-tint);color:var(--danger);}

.report-table .col-cat{width:130px;background:var(--primary-tint);text-align:center;font-weight:800;color:var(--primary-dark);}
.report-table .cat-label{writing-mode:vertical-rl;text-orientation:mixed;display:inline-block;letter-spacing:1px;}
.report-table .col-idx{width:36px;text-align:center;color:var(--muted);}
.report-table .col-num{width:90px;text-align:center;font-weight:700;}
.report-table tfoot td{background:var(--gold-tint);font-weight:800;color:#6b4a17;}
.num-input{width:80px;text-align:center;}
.entry-table .col-name{min-width:260px;}

/* ---------- النماذج المنبثقة ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(14,26,26,0.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50;}
.modal{background:#fff;border-radius:14px;padding:26px 28px;max-width:560px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.25);}
.modal-actions{display:flex;justify-content:flex-start;gap:10px;margin-top:20px;}
fieldset{border:1px solid var(--border);border-radius:8px;margin:14px 0;padding:10px 14px;}
legend{font-weight:800;color:var(--primary-dark);font-size:13px;padding:0 6px;}
.task-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px dashed var(--border);}
.task-row:first-of-type{border-top:none;}
.checkbox-label{display:flex;align-items:center;gap:8px;font-weight:500;font-size:13.5px;color:var(--ink);}
.task-required{width:90px;}
.assign-tasks-body{max-height:50vh;overflow:auto;padding-inline-end:6px;}

.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px;max-width:480px;}

/* ---------- الطباعة ---------- */
.print-only{display:none;}
#printArea{display:none;}
.print-header{text-align:center;margin-bottom:18px;}
.print-header h1{font-size:20px;margin-bottom:2px;}
.print-header h2{font-size:16px;color:var(--gold);margin-bottom:8px;}
.print-meta{display:flex;justify-content:center;gap:24px;font-size:12.5px;color:var(--muted);flex-wrap:wrap;}
.print-footer{margin-top:16px;font-size:11.5px;color:var(--muted);}
.print-footer .note{color:#6b4a17;}
.print-footer .designer{text-align:left;margin-top:10px;}

@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block;position:absolute;top:0;right:0;left:0;width:100%;padding:12mm;}
  .report-table .col-cat{background:#eee !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .report-table .cat-label{writing-mode:vertical-rl;}
  table.report-table th{background:#0E4749 !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table.report-table tfoot td{background:#f6ecda !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}

/* ---------- استجابة للشاشات الصغيرة ---------- */
@media (max-width: 860px){
  .shell{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;align-items:center;}
  .sidebar nav{flex-direction:row;flex-wrap:wrap;}
  .sidebar-user,.sidebar-designer{display:none;}
  .content{padding:20px;}
}

</style>
</head>
<body>
<div id="app"><div class="loading-screen">جاري التحميل…</div></div>
<div id="printArea" class="print-only"></div>
<script>
/* ================== منصة تقارير الدعوة - المنطق الرئيسي ================== */

 {id:'p56',cat:'E',name:'توزيع الكتيبات'},
 {id:'p57',cat:'F',name:'المعرض الدعوي للجاليات'},
 {id:'p58',cat:'F',name:'إنتاج ونشر برنامج العشرة المبشرين بالجنة'},
 {id:'p59',cat:'F',name:'البرنامج الدعوي لبطولة الكريكت'},
 {id:'p60',cat:'F',name:'مسابقة القرآن الكريم في رمضان'},
 {id:'p61',cat:'F',name:'البرنامج الدعوي الرمضاني'}
];

/* ---------- حالة التطبيق ---------- */
const state = {
  users: [],
  programs: [],
  settings: {},
  currentUser: null,
  view: 'login',
  loading: true,
  reportsCache: {},   // userId -> {date: {entries:{progId:{count,beneficiaries}}}}
  ui: {}              // مساحة مؤقتة لحالة الشاشة الحالية (فلاتر، إلخ)
};

/* ---------- أدوات التخزين ---------- */
async function storeGet(key, shared) {
  try {
    const r = await window.storage.get(key, !!shared);
    return r ? r.value : null;
  } catch (e) {
    return null;
  }
}
async function storeSet(key, value, shared) {
  try {
    const r = await window.storage.set(key, value, !!shared);
    return !!r;
  } catch (e) {
    console.error('storage set failed', key, e);
    return false;
  }
}

/* ---------- تشفير كلمات المرور (تجزئة بسيطة من جهة العميل) ---------- */
function randSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function sha256Hex(text) {
  const buf = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function hashPassword(password, salt) {
  return sha256Hex(salt + ':' + password);
}

/* ---------- تواريخ ---------- */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function toISO(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function parseISO(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
function startOfWeek(d) { const dt = new Date(d); dt.setHours(0,0,0,0); dt.setDate(dt.getDate() - dt.getDay()); return dt; }
function endOfWeek(d) { const s = startOfWeek(d); const e = new Date(s); e.setDate(s.getDate() + 6); return e; }
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
function fmtDate(d) {
  const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  return toISO(d);
}
function fmtDateHuman(d) {
  return d.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
}

/* ---------- تحميل / تهيئة البيانات ---------- */
async function loadAll() {
  let usersRaw = await storeGet('org:users', true);
  let programsRaw = await storeGet('org:programs', true);
  let settingsRaw = await storeGet('org:settings', true);

  if (!usersRaw) {
    const salt = randSalt();
    const hash = await hashPassword('admin123', salt);
    const defaultAdmin = {
      id: 'u_admin',
      username: 'admin',
      name: 'مدير الموقع',
      role: 'admin',
      salt, hash,
      isDefaultPassword: true,
      assignedPrograms: [],
      active: true,
      createdAt: new Date().toISOString()
    };
    state.users = [defaultAdmin];
    await storeSet('org:users', JSON.stringify(state.users), true);
  } else {
    try { state.users = JSON.parse(usersRaw); } catch (e) { state.users = []; }
  }

  if (!programsRaw) {
    state.programs = DEFAULT_PROGRAMS.map((p, i) => ({ ...p, order: i }));
    await storeSet('org:programs', JSON.stringify(state.programs), true);
  } else {
    try { state.programs = JSON.parse(programsRaw); } catch (e) { state.programs = DEFAULT_PROGRAMS.map((p,i)=>({...p,order:i})); }
  }

  if (!settingsRaw) {
    state.settings = {
      orgName: 'إدارة الدعوة والإرشاد',
      designerName: '',
      designerUrl: '',
      monthlyDeadlineNote: 'نأمل من الجميع الرفع بتاريخ ٢٥ من كل شهر ميلادي'
    };
    await storeSet('org:settings', JSON.stringify(state.settings), true);
  } else {
    try { state.settings = JSON.parse(settingsRaw); } catch (e) { state.settings = {}; }
  }

  state.loading = false;
}

async function persistUsers() { await storeSet('org:users', JSON.stringify(state.users), true); }
async function persistPrograms() { await storeSet('org:programs', JSON.stringify(state.programs), true); }
async function persistSettings() { await storeSet('org:settings', JSON.stringify(state.settings), true); }

async function loadUserReports(userId) {
  if (state.reportsCache[userId]) return state.reportsCache[userId];
  const raw = await storeGet('org:reports:' + userId, true);
  let data = {};
  if (raw) { try { data = JSON.parse(raw); } catch (e) { data = {}; } }
  state.reportsCache[userId] = data;
  return data;
}
async function saveUserReports(userId) {
  const data = state.reportsCache[userId] || {};
  await storeSet('org:reports:' + userId, JSON.stringify(data), true);
}

/* ---------- منطق التجميع ---------- */
function emptyTotals() { return { count: 0, beneficiaries: 0 }; }

function aggregateRange(reportsObj, fromDate, toDate) {
  const totals = {}; // programId -> {count,beneficiaries}
  const fromISO = toISO(fromDate), toISO_ = toISO(toDate);
  Object.keys(reportsObj || {}).forEach(dateKey => {
    if (dateKey >= fromISO && dateKey <= toISO_) {
      const day = reportsObj[dateKey];
      const entries = (day && day.entries) || {};
      Object.keys(entries).forEach(pid => {
        if (!totals[pid]) totals[pid] = emptyTotals();
        totals[pid].count += Number(entries[pid].count) || 0;
        totals[pid].beneficiaries += Number(entries[pid].beneficiaries) || 0;
      });
    }
  });
  return totals;
}

function programsWithTotals(totals) {
  const list = state.programs.slice().sort((a,b) => a.order - b.order);
  return list.map((p, idx) => ({
    ...p,
    displayIndex: idx + 1,
    count: (totals[p.id] && totals[p.id].count) || 0,
    beneficiaries: (totals[p.id] && totals[p.id].beneficiaries) || 0
  }));
}

function resolvePeriod(type, dateISO) {
  const d = parseISO(dateISO);
  if (type === 'daily') return { from: d, to: d, label: fmtDateHuman(d) };
  if (type === 'weekly') { const f = startOfWeek(d), t = endOfWeek(d); return { from: f, to: t, label: fmtDateHuman(f) + ' — ' + fmtDateHuman(t) }; }
  const f = startOfMonth(d), t = endOfMonth(d);
  return { from: f, to: t, label: d.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long' }) };
}

function buildReportTableHTML(rows) {
  let body = '';
  let i = 0, totalCount = 0, totalBen = 0;
  while (i < rows.length) {
    const cat = rows[i].cat;
    let span = 1;
    while (i + span < rows.length && rows[i + span].cat === cat) span++;
    for (let k = 0; k < span; k++) {
      const r = rows[i + k];
      totalCount += r.count; totalBen += r.beneficiaries;
      body += '<tr>';
      if (k === 0) body += `<td class="col-cat" rowspan="${span}"><span class="cat-label">${escapeHtml(CATEGORIES[cat])}</span></td>`;
      body += `<td class="col-idx">${r.displayIndex}</td><td class="col-name">${escapeHtml(r.name)}</td><td class="col-num">${r.count}</td><td class="col-num">${r.beneficiaries}</td>`;
      body += '</tr>';
    }
    i += span;
  }
  return `<table class="report-table print-table">
    <thead><tr><th class="col-cat">الوحدة</th><th class="col-idx">م</th><th class="col-name">البرنامج الدعوي</th><th class="col-num">العدد</th><th class="col-num">المستفيدين</th></tr></thead>
    <tbody>${body}</tbody>
    <tfoot><tr><td colspan="3">المجموع</td><td class="col-num">${totalCount}</td><td class="col-num">${totalBen}</td></tr></tfoot>
  </table>`;
}

    </div>`;

function exportExcel(rows, meta) {
  if (typeof XLSX === 'undefined') { alert('تعذر تحميل مكتبة إكسل. تأكد من اتصالك بالإنترنت ثم أعد المحاولة.'); return; }
  const wsData = [];
  wsData.push([state.settings.orgName || '']);
  wsData.push([meta.title || 'تقرير دعوي']);
  wsData.push(['الداعية: ' + (meta.userName || '—'), '', 'الفترة: ' + (meta.period || '')]);
  wsData.push([]);
  const headerRowIndex = wsData.length;
  wsData.push(['الوحدة', 'م', 'البرنامج الدعوي', 'العدد', 'المستفيدين']);
  const merges = [];
  let i = 0, totalCount = 0, totalBen = 0;
  while (i < rows.length) {
    const cat = rows[i].cat;
    let span = 1;
    while (i + span < rows.length && rows[i + span].cat === cat) span++;
    const blockStart = wsData.length;
    for (let k = 0; k < span; k++) {
      const r = rows[i + k];
      totalCount += r.count; totalBen += r.beneficiaries;
      wsData.push([k === 0 ? CATEGORIES[cat] : '', r.displayIndex, r.name, r.count, r.beneficiaries]);
    }
    if (span > 1) merges.push({ s: { r: blockStart, c: 0 }, e: { r: blockStart + span - 1, c: 0 } });
    i += span;
  }
  wsData.push(['', '', 'المجموع', totalCount, totalBen]);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 24 }, { wch: 5 }, { wch: 44 }, { wch: 10 }, { wch: 12 }];
  ws['!merges'] = merges;
  wb.Workbook = { Views: [{ RTL: true }] };
  try {
    ['A', 'B', 'C', 'D', 'E'].forEach(col => {
      const ref = col + (headerRowIndex + 1);
      if (ws[ref]) ws[ref].s = { font: { bold: true } };
    });
  } catch (e) { /* التنسيق اختياري */ }
  XLSX.utils.book_append_sheet(wb, ws, 'التقرير');
  XLSX.writeFile(wb, (meta.filename || 'تقرير_دعوي') + '.xlsx');
}
window.printReport = printReport;

    <form id="edit-user-form">
      <label>الاسم الكامل</label><input id="eu-name" value="${escapeHtml(u.name)}" required>
      <label>اسم المستخدم</label><input id="eu-username" value="${escapeHtml(u.username)}" required>
      <div id="edit-user-error" class="error-text"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>`);
  $id('edit-user-form').addEventListener('submit', (e) => submitEditUser(e, id));
}
async function submitEditUser(e, id) {
  e.preventDefault();
  const u = state.users.find(x => x.id === id); if (!u) return;
  const name = $id('eu-name').value.trim();
  const username = $id('eu-username').value.trim();
  const err = $id('edit-user-error');
  if (!name || !username) { err.textContent = 'الرجاء تعبئة جميع الحقول.'; return; }
  if (state.users.some(x => x.username === username && x.id !== id)) { err.textContent = 'اسم المستخدم مستخدم من شخص آخر.'; return; }
  u.name = name; u.username = username;
  await persistUsers();
  closeModal();
  goto('users');
}

function openResetPasswordModal(id) {
  const u = state.users.find(x => x.id === id); if (!u) return;
  openModal(`
    <h2>كلمة مرور جديدة لـ ${escapeHtml(u.name)}</h2>
    <form id="reset-pw-form">
      <label>كلمة المرور الجديدة</label><input id="rp-password" type="text" required>
      <div id="reset-pw-error" class="error-text"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>`);
  $id('reset-pw-form').addEventListener('submit', (e) => submitResetPassword(e, id));
}
async function submitResetPassword(e, id) {
  e.preventDefault();
  const u = state.users.find(x => x.id === id); if (!u) return;
  const password = $id('rp-password').value;
  if (!password || password.length < 4) { $id('reset-pw-error').textContent = 'كلمة المرور قصيرة جداً (٤ أحرف على الأقل).'; return; }
  const salt = randSalt();
  u.salt = salt; u.hash = await hashPassword(password, salt); u.isDefaultPassword = false;
  await persistUsers();
  closeModal();
  alert('تم تحديث كلمة المرور بنجاح.');
}

async function toggleUserActive(id) {
  const u = state.users.find(x => x.id === id); if (!u) return;
  u.active = u.active === false ? true : false;
  await persistUsers();
  goto('users');
}

function openAssignTasksModal(id) {
  const u = state.users.find(x => x.id === id); if (!u) return;
  const assigned = {};
  (u.assignedPrograms || []).forEach(ap => { assigned[ap.programId] = ap.required; });
  let bodyHtml = '';
  CATEGORY_ORDER.forEach(cat => {
    const progs = state.programs.filter(p => p.cat === cat).sort((a, b) => a.order - b.order);
    if (!progs.length) return;
    bodyHtml += `<fieldset><legend>${escapeHtml(CATEGORIES[cat])}</legend>`;
    progs.forEach(p => {
      const checked = Object.prototype.hasOwnProperty.call(assigned, p.id);
      bodyHtml += `<div class="task-row">
        <label class="checkbox-label"><input type="checkbox" class="task-check" data-pid="${p.id}" ${checked ? 'checked' : ''}> ${escapeHtml(p.name)}</label>
        <input type="number" min="0" class="task-required num-input" data-pid="${p.id}" value="${checked ? assigned[p.id] : 0}" placeholder="الهدف الشهري">
      </div>`;
    });
    bodyHtml += `</fieldset>`;
  });
  openModal(`
    <h2>تعيين المهام — ${escapeHtml(u.name)}</h2>
    <p class="muted">حدد البرامج المطلوبة من هذا الشخص وضع هدفاً شهرياً لكل برنامج. إن لم تُحدد أي برنامج، ستظهر له كل البرامج للتسجيل الحر دون قيود.</p>
    <div class="assign-tasks-body">${bodyHtml}</div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button type="button" class="btn btn-primary" onclick="submitAssignTasks('${id}')">حفظ المهام</button>
    </div>`);
}
async function submitAssignTasks(id) {
  const u = state.users.find(x => x.id === id); if (!u) return;
  const checks = document.querySelectorAll('.task-check');
  const assignedPrograms = [];
  checks.forEach(chk => {
    if (chk.checked) {
      const pid = chk.getAttribute('data-pid');
      const reqInput = document.querySelector('.task-required[data-pid="' + pid + '"]');
      const required = Math.max(0, parseInt((reqInput && reqInput.value) || '0', 10) || 0);
      assignedPrograms.push({ programId: pid, required });
    }
  });
  u.assignedPrograms = assignedPrograms;
  await persistUsers();
  closeModal();
  goto('users');
}
window.openAddUserModal = openAddUserModal;
window.openEditUserModal = openEditUserModal;
window.openResetPasswordModal = openResetPasswordModal;
window.toggleUserActive = toggleUserActive;
window.openAssignTasksModal = openAssignTasksModal;
window.submitAssignTasks = submitAssignTasks;

/* ================= إدارة البرامج الدعوية ================= */
function renderProgramsView() {
  let rowsHtml = '';
  CATEGORY_ORDER.forEach(cat => {
    const progs = state.programs.filter(p => p.cat === cat).sort((a, b) => a.order - b.order);
    if (!progs.length) return;
    rowsHtml += `<tr class="cat-row"><td colspan="2">${escapeHtml(CATEGORIES[cat])}</td></tr>`;
    progs.forEach(p => {
      rowsHtml += `<tr>
        <td>${escapeHtml(p.name)}</td>
        <td class="actions-cell">
          <button class="btn btn-xs" onclick="openEditProgramModal('${p.id}')">تعديل</button>
          <button class="btn btn-xs btn-danger" onclick="deleteProgram('${p.id}')">حذف</button>
        </td>
      </tr>`;
    });
  });
  return `
  <h1 class="page-title">البرامج الدعوية</h1>
  <p class="muted">القائمة معبأة مسبقاً من نموذج المتابعة الأصلي. راجعها فقد تحتاج بعض الأسماء لتصحيح بسيط، ويمكنك التعديل أو الإضافة أو الحذف بحرية.</p>
  <button class="btn btn-primary" onclick="openAddProgramModal()">+ إضافة برنامج</button>
  <table class="data-table">
    <thead><tr><th>اسم البرنامج</th><th>إجراءات</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;
}
function openAddProgramModal() {
  openModal(`
    <h2>إضافة برنامج دعوي</h2>
    <form id="add-prog-form">
      <label>اسم البرنامج</label><input id="np-name" required>
      <label>الوحدة</label>
      <select id="np-cat">${CATEGORY_ORDER.map(c => `<option value="${c}">${escapeHtml(CATEGORIES[c])}</option>`).join('')}</select>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>`);
  $id('add-prog-form').addEventListener('submit', submitAddProgram);
}
async function submitAddProgram(e) {
  e.preventDefault();
  const name = $id('np-name').value.trim();
  const cat = $id('np-cat').value;
  if (!name) return;
  const maxOrder = state.programs.reduce((m, p) => Math.max(m, p.order), 0);
  state.programs.push({ id: 'p_' + Date.now(), cat, name, order: maxOrder + 1 });
  await persistPrograms();
  closeModal();
  goto('programs');
}
function openEditProgramModal(id) {
  const p = state.programs.find(x => x.id === id); if (!p) return;
  openModal(`
    <h2>تعديل البرنامج</h2>
    <form id="edit-prog-form">
      <label>اسم البرنامج</label><input id="ep-name" value="${escapeHtml(p.name)}" required>
      <label>الوحدة</label>
      <select id="ep-cat">${CATEGORY_ORDER.map(c => `<option value="${c}" ${c === p.cat ? 'selected' : ''}>${escapeHtml(CATEGORIES[c])}</option>`).join('')}</select>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>`);
  $id('edit-prog-form').addEventListener('submit', (e) => submitEditProgram(e, id));
}
async function submitEditProgram(e, id) {
  e.preventDefault();
  const p = state.programs.find(x => x.id === id); if (!p) return;
  p.name = $id('ep-name').value.trim();
  p.cat = $id('ep-cat').value;
  await persistPrograms();
  closeModal();
  goto('programs');
}
async function deleteProgram(id) {
  if (!confirm('هل تريد حذف هذا البرنامج؟ الأرقام المُدخلة سابقاً في السجلات القديمة تبقى محفوظة لكنها لن تظهر في التقارير الجديدة.')) return;
  state.programs = state.programs.filter(p => p.id !== id);
  await persistPrograms();
  goto('programs');
}
window.openAddProgramModal = openAddProgramModal;
window.openEditProgramModal = openEditProgramModal;
window.deleteProgram = deleteProgram;

/* ================= تقارير المدير (فردي / كلي) ================= */
async function renderAdminReportsView() {
  const people = state.users.filter(u => u.role === 'user');
  const selectedUser = state.ui.reportUserId || 'ALL';
  const type = state.ui.periodType || 'monthly';
  const dateISO = state.ui.periodDate || toISO(new Date());
  const period = resolvePeriod(type, dateISO);

  let totals, userNameLabel;
  if (selectedUser === 'ALL') {
    totals = await aggregateAllUsers(period.from, period.to);
    userNameLabel = 'جميع الدعاة (تقرير كلي)';
  } else {
    const u = state.users.find(x => x.id === selectedUser);
    const reports = await loadUserReports(selectedUser);
    totals = aggregateRange(reports, period.from, period.to);
    userNameLabel = u ? u.name : '';
  }
  const rows = programsWithTotals(totals);
  const tableHtml = buildReportTableHTML(rows);
  setLastReport(rows, {
    title: 'تقرير ' + (type === 'daily' ? 'يومي' : type === 'weekly' ? 'أسبوعي' : 'شهري'),
    userName: userNameLabel, period: period.label,
    filename: 'تقرير_' + (selectedUser === 'ALL' ? 'كلي' : userNameLabel)
  });

  if (!people.length) {
    return `<h1 class="page-title">التقارير</h1><p class="muted">لا يوجد أشخاص مضافون بعد. أضف أشخاصاً من صفحة "الأشخاص" أولاً.</p>`;
  }

  return `
  <h1 class="page-title">التقارير</h1>
  <div class="toolbar">
    <label>عرض تقرير:
      <select onchange="onReportUserChange(this.value)">
        <option value="ALL" ${selectedUser === 'ALL' ? 'selected' : ''}>التقرير الكلي (جميع الدعاة)</option>
        ${people.map(p => `<option value="${p.id}" ${selectedUser === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
      </select>
    </label>
    <label>الفترة:
      <select onchange="onReportPeriodTypeChange(this.value)">
        <option value="daily" ${type === 'daily' ? 'selected' : ''}>يومي</option>
        <option value="weekly" ${type === 'weekly' ? 'selected' : ''}>أسبوعي</option>
        <option value="monthly" ${type === 'monthly' ? 'selected' : ''}>شهري</option>
      </select>
    </label>
    <label>التاريخ المرجعي: <input type="date" value="${dateISO}" onchange="onReportPeriodDateChange(this.value)"></label>
    <button class="btn btn-secondary" onclick="doPrintCurrentReport()">🖶 طباعة</button>
    <button class="btn btn-secondary" onclick="doExportCurrentReport()">⬇ تصدير Excel</button>
  </div>
  <p class="muted">الداعية: ${escapeHtml(userNameLabel)} — الفترة: ${escapeHtml(period.label)}</p>
  ${tableHtml}
  `;
}
function onReportUserChange(v) { state.ui.reportUserId = v; render(); }
function onReportPeriodTypeChange(v) { state.ui.periodType = v; render(); }
function onReportPeriodDateChange(v) { state.ui.periodDate = v; render(); }
window.onReportUserChange = onReportUserChange;
window.onReportPeriodTypeChange = onReportPeriodTypeChange;
window.onReportPeriodDateChange = onReportPeriodDateChange;

async function aggregateAllUsers(from, to) {
  const totals = {};
  const people = state.users.filter(u => u.role === 'user');
  for (const u of people) {
    const reports = await loadUserReports(u.id);
    const t = aggregateRange(reports, from, to);
    Object.keys(t).forEach(pid => {
      if (!totals[pid]) totals[pid] = { count: 0, beneficiaries: 0 };
      totals[pid].count += t[pid].count;
      totals[pid].beneficiaries += t[pid].beneficiaries;
    });
  }
  return totals;
}

/* ================= الإعدادات ================= */
function renderSettingsView() {
  const isAdmin = state.currentUser.role === 'admin';
  return `
  <h1 class="page-title">الإعدادات</h1>
  <section class="settings-section">
    <h2>تغيير كلمة المرور</h2>
    <form id="change-pw-form" onsubmit="return handleChangePassword(event)">
      <label>كلمة المرور الحالية</label><input id="cp-old" type="password" required>
      <label>كلمة المرور الجديدة</label><input id="cp-new" type="password" required>
      <label>تأكيد كلمة المرور الجديدة</label><input id="cp-confirm" type="password" required>
      <div id="change-pw-error" class="error-text"></div>
      <div id="change-pw-success" class="success-text"></div>
      <button type="submit" class="btn btn-primary">تحديث كلمة المرور</button>
    </form>
  </section>
  ${isAdmin ? `
  <section class="settings-section">
    <h2>إعدادات الموقع</h2>
    <form id="org-settings-form" onsubmit="return handleOrgSettings(event)">
      <label>اسم الجهة</label><input id="os-orgname" value="${escapeHtml(state.settings.orgName || '')}">
      <label>ملاحظة الموعد الشهري (تظهر في التقارير)</label><input id="os-note" value="${escapeHtml(state.settings.monthlyDeadlineNote || '')}">
      <label>اسم مصمم الموقع</label><input id="os-designer-name" value="${escapeHtml(state.settings.designerName || '')}">
      <label>رابط موقع/حساب المصمم</label><input id="os-designer-url" value="${escapeHtml(state.settings.designerUrl || '')}" placeholder="https://">
      <div id="org-settings-success" class="success-text"></div>
      <button type="submit" class="btn btn-primary">حفظ الإعدادات</button>
    </form>
  </section>` : ''}
  `;
}
async function handleChangePassword(e) {
  e.preventDefault();
  const u = state.currentUser;
  const oldPw = $id('cp-old').value, newPw = $id('cp-new').value, confirmPw = $id('cp-confirm').value;
  const err = $id('change-pw-error'), ok = $id('change-pw-success');
  err.textContent = ''; ok.textContent = '';
  const oldHash = await hashPassword(oldPw, u.salt);
  if (oldHash !== u.hash) { err.textContent = 'كلمة المرور الحالية غير صحيحة.'; return false; }
  if (newPw.length < 4) { err.textContent = 'كلمة المرور الجديدة قصيرة جداً (٤ أحرف على الأقل).'; return false; }
  if (newPw !== confirmPw) { err.textContent = 'كلمتا المرور غير متطابقتين.'; return false; }
  const salt = randSalt();
  u.salt = salt; u.hash = await hashPassword(newPw, salt); u.isDefaultPassword = false;
  await persistUsers();
  ok.textContent = 'تم تحديث كلمة المرور بنجاح.';
  $id('cp-old').value = ''; $id('cp-new').value = ''; $id('cp-confirm').value = '';
  return false;
}
async function handleOrgSettings(e) {
  e.preventDefault();
  state.settings.orgName = $id('os-orgname').value.trim();
  state.settings.monthlyDeadlineNote = $id('os-note').value.trim();
  state.settings.designerName = $id('os-designer-name').value.trim();
  state.settings.designerUrl = $id('os-designer-url').value.trim();
  await persistSettings();
  const ok = $id('org-settings-success');
  if (ok) ok.textContent = 'تم حفظ الإعدادات.';
  return false;
}
window.handleChangePassword = handleChangePassword;
window.handleOrgSettings = handleOrgSettings;

</script>

(async function boot(){

</script>
